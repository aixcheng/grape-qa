<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2c3e50"/>
    </marker>
    <filter id="shadow"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/></filter>
  </defs>

  <style>
    text { font-family: "Microsoft YaHei", "SimHei", sans-serif; }
    .title { font-size: 18px; font-weight: bold; fill: #1a1a2e; text-anchor: middle; }
    .lbl { font-size: 12px; fill: #2c3e50; text-anchor: middle; }
    .sm { font-size: 10px; fill: #555; text-anchor: middle; }
  </style>

  <!-- Background -->
  <rect width="900" height="720" fill="#fafbfc"/>

  <!-- Title -->
  <text x="450" y="30" class="title">图X  AC自动机实体匹配算法流程</text>

  <!-- Start -->
  <rect x="375" y="55" width="150" height="36" rx="18" fill="#27ae60" filter="url(#shadow)"/>
  <text x="450" y="78" class="lbl" fill="#fff">START: 用户输入问题Q</text>

  <!-- Arrow Start→Step1 -->
  <line x1="450" y1="91" x2="450" y2="110" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 1 -->
  <rect x="100" y="115" width="700" height="52" rx="6" fill="#e8f4f8" stroke="#2c3e50" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="137" class="lbl">Step 1: 构建实体字典</text>
  <text x="450" y="155" class="sm">从Neo4j加载223个实体 (Disease / Pest / Alias / Symptom / Part)，按名称长度降序排列 → ENTITY_LIST</text>

  <!-- Arrow -->
  <line x1="450" y1="167" x2="450" y2="186" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="100" y="191" width="700" height="52" rx="6" fill="#e8f4f8" stroke="#2c3e50" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="213" class="lbl">Step 2: 扫描匹配</text>
  <text x="450" y="231" class="sm">遍历ENTITY_LIST，使用Python find()在问题Q中定位每个实体名称首次出现位置</text>

  <!-- Arrow -->
  <line x1="450" y1="243" x2="450" y2="262" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Diamond 1: Position Overlap -->
  <polygon points="450,265 520,300 450,335 380,300" fill="#fff3e0" stroke="#2c3e50" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="297" class="lbl" font-size="10">Step 3</text>
  <text x="450" y="312" class="sm" font-size="9">位置重叠?</text>

  <!-- Arrow to Skip -->
  <line x1="520" y1="300" x2="580" y2="300" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="550" y="293" class="sm" font-size="9">是</text>

  <!-- Skip Box -->
  <rect x="585" y="273" width="180" height="54" rx="6" fill="#fef5e7" stroke="#2c3e50" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="675" y="295" class="lbl" font-size="11">跳过该匹配</text>
  <text x="675" y="313" class="sm" font-size="10">继续匹配下一个实体</text>

  <!-- Skip→Diamond2 line -->
  <line x1="675" y1="327" x2="675" y2="370" stroke="#2c3e50" stroke-width="1.2"/>
  <line x1="675" y1="370" x2="520" y2="370" stroke="#2c3e50" stroke-width="1.2"/>

  <!-- No-overlap arrow to Diamond2 -->
  <line x1="450" y1="335" x2="450" y2="355" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="460" y="350" class="sm" font-size="9">否</text>

  <!-- Diamond 2: Any Match -->
  <polygon points="450,358 520,393 450,428 380,393" fill="#fff3e0" stroke="#2c3e50" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="390" class="lbl" font-size="10">Step 4</text>
  <text x="450" y="405" class="sm" font-size="9">有匹配?</text>

  <!-- Yes → Output Exact -->
  <line x1="380" y1="393" x2="300" y2="393" stroke="#2c3e50" stroke-width="1.5"/>
  <line x1="300" y1="393" x2="300" y2="465" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="390" y="386" class="sm" font-size="9">是</text>

  <!-- Output exact match -->
  <rect x="180" y="470" width="240" height="60" rx="6" fill="#e8f8e8" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="300" y="492" class="lbl">输出精确匹配结果</text>
  <text x="300" y="512" class="sm">(entity_name, entity_type, 1.0) 取 Top-5</text>

  <!-- No → Diamond 3 -->
  <line x1="520" y1="393" x2="560" y2="393" stroke="#2c3e50" stroke-width="1.5"/>
  <line x1="560" y1="393" x2="560" y2="440" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="530" y="386" class="sm" font-size="9">否</text>

  <!-- Diamond 3: Fallback Trigger -->
  <polygon points="560,443 640,478 560,513 480,478" fill="#fff3e0" stroke="#2c3e50" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="560" y="475" class="lbl" font-size="10">精确匹配为空?</text>

  <!-- No → No match -->
  <line x1="480" y1="478" x2="440" y2="478" stroke="#2c3e50" stroke-width="1.5"/>
  <line x1="440" y1="478" x2="440" y2="535" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="470" y="471" class="sm" font-size="9">否</text>

  <!-- No match box -->
  <rect x="330" y="540" width="220" height="50" rx="6" fill="#fde8f0" stroke="#e74c3c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="440" y="562" class="lbl" font-size="11">返回空集（无匹配实体）</text>
  <text x="440" y="578" class="sm" font-size="10">提示"暂时无法回答"</text>

  <!-- Yes → BGE -->
  <line x1="640" y1="478" x2="660" y2="478" stroke="#2c3e50" stroke-width="1.5"/>
  <line x1="660" y1="478" x2="660" y2="540" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="650" y="471" class="sm" font-size="9">是</text>

  <!-- BGE Fallback -->
  <rect x="530" y="545" width="260" height="72" rx="6" fill="#e8e8f8" stroke="#2c3e50" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="660" y="565" class="lbl">Step 5: BGE语义回退</text>
  <text x="660" y="583" class="sm">将Q编码为1024维向量(BGE-large-zh-v1.5)</text>
  <text x="660" y="601" class="sm">与223个实体向量逐一计算cosine相似度，取最高分</text>

  <!-- Arrow to Diamond 4 -->
  <line x1="660" y1="617" x2="660" y2="640" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Diamond 4: Threshold -->
  <polygon points="660,643 720,668 660,693 600,668" fill="#fff3e0" stroke="#2c3e50" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="660" y="665" class="lbl" font-size="10">cosine &gt; 0.6 ?</text>

  <!-- No → No match -->
  <line x1="600" y1="668" x2="570" y2="668" stroke="#2c3e50" stroke-width="1.5"/>
  <line x1="570" y1="668" x2="570" y2="580" stroke="#2c3e50" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="590" y="661" class="sm" font-size="9">否</text>

  <!-- Yes → End -->
  <line x1="720" y1="668" x2="780" y2="668" stroke="#2c3e50" stroke-width="1.5"/>
  <line x1="780" y1="668" x2="780" y2="695" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="730" y="661" class="sm" font-size="9">是</text>

  <!-- End -->
  <rect x="680" y="698" width="200" height="30" rx="15" fill="#e74c3c" filter="url(#shadow)"/>
  <text x="780" y="718" class="lbl" fill="#fff" font-size="11">END: 输出 E = {(ei, ti, si)}</text>

  <!-- Output→End line -->
  <line x1="300" y1="530" x2="300" y2="620" stroke="#2c3e50" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="300" y1="620" x2="780" y2="620" stroke="#2c3e50" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="780" y1="620" x2="780" y2="698" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

</svg>
